name: Autograde
on:
  - push
  - workflow_dispatch

permissions:
  checks: write
  contents: read

jobs:
  grade:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:

      - name: debug
        shell: bash
        run: |
          echo "ls"
          ls -la
          echo "pwd"
          pwd
          echo "mkdir"
          mkdir -p "$HOME/workdir"
          chmod 777 "$HOME/workdir"
          echo "ls"
          ls -la "$HOME"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Autograding
        uses: DKU-IRDM-Classroom/Test-Classroom-Test-Assignment-C-grader@v1
        with:
          time-limit: 2
          memory-limit: 256m
          output-limit: 1048576
